; php.ini for Vercel PHP runtime (vercel-php)
; This file must live alongside api/index.php

; ── Error handling ────────────────────────────────────────────────────────────
display_errors = Off
log_errors = On
error_log = /tmp/php-errors.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Performance ───────────────────────────────────────────────────────────────
memory_limit = 512M
max_execution_time = 30
upload_max_filesize = 20M
post_max_size = 25M

; ── Extensions required by Laravel ───────────────────────────────────────────
extension = pdo.so
extension = pdo_mysql.so
extension = pdo_sqlite.so
extension = mbstring.so
extension = tokenizer.so
extension = xml.so
extension = ctype.so
extension = json.so
extension = bcmath.so
extension = fileinfo.so
extension = openssl.so
extension = curl.so
extension = zip.so
extension = dom.so

; ── Session (using cookie driver, but configure for safety) ──────────────────
session.save_path = /tmp/sessions
